<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Calculator</title>
    <link rel="stylesheet" href="style2.css">
</head>
<body>
    <div class="calc">
        <input type="text" readonly id="dis-inp">

        <button id="reverse">+/-</button>
        <button id="clear">C</button>
        <button id="back"><img src="backspace.png" alt=""></button>
        <button class="op" value="/">/</button>

        <button class="num" value=7>7</button>
        <button class="num" value=8>8</button>
        <button class="num" value=9>9</button>
        <button class="op" value =*>*</button>

        <button class="num" value=4>4</button>
        <button class="num" value=5>5</button>
        <button class="num" value=6>6</button>
        <button class="op"  value=->-</button>

        <button class="num" value=1>1</button>
        <button class="num" value=2>2</button>
        <button class="num" value=3>3</button>
        <button class="op"  value=+>+</button>

        <button id="dot" value=".">.</button>
        <button class="num" value=0>0</button>
        <button class="num" value="00">00</button>
        <button id="equal">=</button>
    
        <button id="hol">💵</button>
        <button id="rec">🧾</button>
        <button id="tip">🪙</button>
        <button id="add">إضافي</button>
    </div>
    <div class="details">

        <label for="holy">💵المجمد</label>
        <input type="text" id="holy" readonly>

        <label for="receit">🧾التحويلات</label>
        <input type="text"  id="receit" readonly>

        <label for="tips">🪙الفكة</label>
        <input type="text" id="tips" readonly>

        <label for="addf">➕إضافي</label>
        <input type="text" id="addf" readonly>
        
        <label for="total">الإجمالي</label>
        <input type="text" id="total" readonly>

        <label for="in">في الدرج</label>
        <input type="text" id="in">

        <label for="diff">الفرق</label>
        <input type="text" id="diff" readonly>
    </div>
    <!-- <script src="main.js"></script> -->
    <script src="test.js"></script>
</body>
</html>
